server.modules = ( "mod_dirlisting", "mod_status", "mod_cgi", "mod_accesslog", "mod_openssl" )

# Demonstrate variable expansion
var.basedir = "/var/www/localhost"
server.document-root = var.basedir + "/htdocs"

server.port = 8080
server.errorlog = "/var/log/lighttpd/error.log"
server.tag = "lighttpd"
index-file.names = ( "index.html" )

# Intentionally insecure: status endpoint without remoteip restriction
status.status-url = "/server-status"

# Conditional block: targeted analysis example
$HTTP["host"] == "secure.example.com" {
    server.tag = ""
}

include "conf.d/*.conf"
