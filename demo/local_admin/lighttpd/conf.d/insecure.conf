# Intentionally insecure: directory listing
dir-listing.activate = "enable"

# Intentionally insecure: weak TLS configuration on a dedicated TLS socket.
$SERVER["socket"] == ":8443" {
    ssl.engine = "enable"
    ssl.pemfile = "/var/lib/lighttpd/demo.pem"
    ssl.cipher-list = "RC4-SHA:AES256-GCM-SHA384"
}
