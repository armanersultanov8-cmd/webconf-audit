user nginx;
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens on;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        location = / {
            if ($request_method = HEAD) {
                return 405;
            }

            try_files /index.html =404;
        }

        location = /nginx_status {
            stub_status;
            access_log off;
        }

        location / {
            index index.html;
        }
    }
}
