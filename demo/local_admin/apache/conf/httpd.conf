ServerRoot "/usr/local/apache2/conf"
Listen 80
PidFile "/tmp/httpd.pid"

LoadModule mpm_event_module ../modules/mod_mpm_event.so
LoadModule authn_core_module ../modules/mod_authn_core.so
LoadModule authz_core_module ../modules/mod_authz_core.so
LoadModule authz_host_module ../modules/mod_authz_host.so
LoadModule access_compat_module ../modules/mod_access_compat.so
LoadModule log_config_module ../modules/mod_log_config.so
LoadModule dir_module ../modules/mod_dir.so
LoadModule alias_module ../modules/mod_alias.so
LoadModule autoindex_module ../modules/mod_autoindex.so
LoadModule status_module ../modules/mod_status.so
LoadModule info_module ../modules/mod_info.so
LoadModule cgi_module ../modules/mod_cgi.so
LoadModule include_module ../modules/mod_include.so
LoadModule unixd_module ../modules/mod_unixd.so

ServerName localhost
User daemon
Group daemon
DocumentRoot "../htdocs"
LogFormat "%h %l %u %t \"%r\" %>s %b" common
ErrorLog "/proc/self/fd/2"
CustomLog "/proc/self/fd/1" common
ServerSignature Off
ServerTokens Prod
TraceEnable Off
LimitRequestBody 102400
LimitRequestFields 100
ErrorDocument 404 /custom404.html
ErrorDocument 500 /custom500.html

<Directory "../htdocs">
    AllowOverride All
    Options Indexes Includes
    IndexOptions FancyIndexing ScanHTMLTitles
    Require all granted
</Directory>

<FilesMatch "\.(bak|old|swp)$">
    Require all denied
</FilesMatch>

Include extra/insecure.conf

# VirtualHost block: exercises ServerName/ServerAlias applicability,
# VH-scoped directive layering, and Location within a VH.
<VirtualHost *:80>
    ServerName secure.example.com
    ServerAlias www.secure.example.com
    DocumentRoot "../htdocs"
    ServerSignature Off
    <Location "/admin">
        Require all denied
    </Location>
</VirtualHost>
